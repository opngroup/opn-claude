name: Update README on skill change

on:
  pull_request:
    types: [opened, synchronize]
    paths:
      - "*.md"
      - "!README.md"

jobs:
  update-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run README update script
        run: |
          chmod +x scripts/update-readme.sh
          bash scripts/update-readme.sh

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet README.md && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit updated README
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "docs: auto-update README skill table"
          git push
